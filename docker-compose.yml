services:
  careerhub-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: careerhub-api

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=careerhub;Username=postgres;Password=postgres"

    depends_on:
      - postgres

  postgres:
    image: postgres:17

    container_name: careerhub-db

    environment:
      POSTGRES_DB: careerhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: