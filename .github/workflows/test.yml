name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/careerhub-frontend/package-lock.json

      - name: Install dependencies
        working-directory: Client/careerhub-frontend
        run: npm ci

      - name: Run tests
        working-directory: Client/careerhub-frontend
        run: npm run test:run